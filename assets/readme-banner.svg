<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Banner de Cesar Minerva Senior QA Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="0.58" stop-color="#1a0f3a"/>
      <stop offset="1" stop-color="#101f4d"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4c90ff" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#4c90ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#4cffb4" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="22" fill="url(#bg)"/>

  <circle cx="1070" cy="-10" r="220" fill="#4c90ff" fill-opacity="0.14" filter="url(#glow)"/>
  <circle cx="1220" cy="250" r="180" fill="#4cffb4" fill-opacity="0.12" filter="url(#glow)"/>

  <path d="M0 248H1280" stroke="url(#line)" stroke-width="2"/>

  <g transform="translate(72,74)">
    <rect x="0" y="0" width="190" height="38" rx="19" fill="#4c90ff" fill-opacity="0.16" stroke="#4c90ff"/>
    <text x="95" y="25" text-anchor="middle" fill="#4c90ff" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="1.6">PORTFOLIO</text>

    <text x="0" y="102" fill="#ffffff" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="800" letter-spacing="-0.8">César Minerva</text>
    <text x="0" y="146" fill="#8b98c5" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Senior QA Engineer | Quality Engineering</text>

    <g transform="translate(0,178)">
      <rect x="0" y="0" width="186" height="34" rx="17" fill="#4cffb4" fill-opacity="0.14" stroke="#4cffb4"/>
      <text x="93" y="23" text-anchor="middle" fill="#4cffb4" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700">4+ YEARS IN QA</text>

      <rect x="200" y="0" width="210" height="34" rx="17" fill="#4c90ff" fill-opacity="0.14" stroke="#4c90ff"/>
      <text x="305" y="23" text-anchor="middle" fill="#4c90ff" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700">E2E + API AUTOMATION</text>

      <rect x="424" y="0" width="146" height="34" rx="17" fill="#4c90ff" fill-opacity="0.14" stroke="#4c90ff"/>
      <text x="497" y="23" text-anchor="middle" fill="#4c90ff" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700">CI/CD READY</text>
    </g>
  </g>
</svg>
